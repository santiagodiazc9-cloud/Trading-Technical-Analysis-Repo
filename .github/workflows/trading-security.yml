name: trading-security

# Saturday 11:00 AM ET security scan. Mirrors the launchd
# com.claude.tradingagent.security job. Independent of the trading
# dispatch workflow so it still runs if dispatch is disabled.
#
# Disabled by default — set repo variable `TRADING_GHA_ENABLED` to `true`
# to enable.

on:
  schedule:
    # 11:00 ET Sat = 15:00 UTC (EDT) or 16:00 UTC (EST). Both fire; the
    # dispatch script picks the matching ET slot.
    - cron: "0 15,16 * * 6"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: America/New_York

    steps:
      - name: Guard — workflow disabled
        if: vars.TRADING_GHA_ENABLED != 'true'
        run: |
          echo "TRADING_GHA_ENABLED not 'true' — exiting."
          exit 0

      - name: Guard — only run at 11:00 ET
        if: vars.TRADING_GHA_ENABLED == 'true'
        id: tcheck
        run: |
          ET_HOUR="$(TZ=America/New_York date '+%H')"
          if [ "$ET_HOUR" != "11" ]; then
            echo "Skip — current ET hour is $ET_HOUR, not 11."
            echo "ran=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ran=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.tcheck.outputs.ran == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        if: steps.tcheck.outputs.ran == 'true'
        run: |
          git config user.email "trading-agent@github-actions.local"
          git config user.name  "trading-agent"

      - name: Set up Python
        if: steps.tcheck.outputs.ran == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node
        if: steps.tcheck.outputs.ran == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        if: steps.tcheck.outputs.ran == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm install -g @anthropic-ai/claude-code

      - name: Recreate .env
        if: steps.tcheck.outputs.ran == 'true'
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cat <<EOF > .env
          ALPACA_API_KEY=${ALPACA_API_KEY}
          ALPACA_API_SECRET=${ALPACA_API_SECRET}
          ALPACA_BASE_URL=${ALPACA_BASE_URL:-https://paper-api.alpaca.markets}
          ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
          EOF

      - name: Run security routine
        if: steps.tcheck.outputs.ran == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          bash scripts/run_claude_routine.sh "routines/7_security_scan.md"

      - name: Sync findings to git
        if: steps.tcheck.outputs.ran == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STAMP="$(TZ=America/New_York date '+%Y-%m-%d %H:%M %Z')"
          python3 scripts/git_sync.py sync "routine(security_scan): ${STAMP} — Saturday scan" || true
